spring.application.name=news-ai
server.port=8080

# Import .env file as a properties source (built-in Spring Boot feature)
spring.config.import=optional:file:.env[.properties]

# CORS — override in production with a specific origin (e.g. https://yourdomain.com).
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:*}

# API keys — loaded from .env file or environment variables.
news.api.key=${NEWS_API_KEY}
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# How many articles to fetch from NewsAPI.
news.fetch.page-size=8